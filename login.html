<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartInvoice Kenya</title>
    <style>
        /* AUTHORITY PALETTE VARIABLES */
        :root {
            --primary-navy: #0f172a;
            --secondary-navy: #1e293b;
            --trust-green: #059669;
            --trust-green-hover: #065f46;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            --slate-border: #cbd5e1;
            --text-main: #1e293b;
            --text-muted: #475569;
            --bg-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* CONTAINER STRUCTURE */
        .auth-container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        .auth-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 4px solid var(--trust-green);
        }

        .auth-header h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            font-size: 0.9em;
            opacity: 0.8;
            line-height: 1.4;
        }

        .auth-form-wrapper {
            padding: 30px;
        }

        /* TAB NAVIGATION - FIXED "MIXING" ISSUE */
        .toggle-buttons {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
        }

        .toggle-btn {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s ease;
            position: relative;
        }

        .toggle-btn:hover {
            color: var(--secondary-navy);
        }

        .toggle-btn.active {
            color: var(--primary-navy);
            font-weight: 700;
        }

        .toggle-btn.active::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--trust-green);
        }

        /* FORM ELEMENTS */
        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9em;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--slate-border);
            border-radius: 8px;
            font-size: 1em;
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--trust-green);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: var(--trust-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: var(--trust-green-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* ALERTS */
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
            border-left: 4px solid transparent;
        }

        .alert.success {
            display: block;
            background: #f0fdf4;
            color: #166534;
            border-left-color: #22c55e;
        }

        .alert.error {
            display: block;
            background: #fef2f2;
            color: #991b1b;
            border-left-color: #ef4444;
        }

        /* EXTRAS */
        .bank-details-section {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin: 20px 0;
        }

        .bank-details-section h4 {
            margin-bottom: 15px;
            color: var(--primary-navy);
            font-size: 0.95em;
        }

        .feature-list {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .feature-list ul {
            list-style: none;
            font-size: 0.85em;
            color: var(--text-muted);
        }

        .feature-list li {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .feature-list li::before {
            content: "✓";
            color: var(--trust-green);
            font-weight: bold;
            margin-right: 10px;
        }

        .link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9em;
        }

        .link a {
            color: var(--trust-green);
            text-decoration: none;
            font-weight: 600;
        }

        .phone-hint {
            font-size: 0.75em;
            color: var(--text-muted);
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>SmartInvoice</h1>
            <p>KRA Compliant Invoicing for Kenyan Businesses</p>
        </div>
        
        <div class="auth-form-wrapper">
            <div class="toggle-buttons">
                <button class="toggle-btn active" id="tab-login" onclick="showPanel('login')">Login</button>
                <button class="toggle-btn" id="tab-register" onclick="showPanel('register')">Create Account</button>
            </div>
            
            <div id="alert" class="alert"></div>
            
            <div id="loginPanel" class="form-panel active">
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="business@example.co.ke" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">Secure Login</button>
                </form>
                
                <div class="link">
                    <a href="#" onclick="showPanel('register')">New here? Register for a free trial</a>
                </div>
            </div>
            
            <div id="registerPanel" class="form-panel">
                <form id="registerForm">
                    <div class="form-group">
                        <label>Business Name</label>
                        <input type="text" id="regBusinessName" placeholder="Simba Enterprises Ltd" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="regEmail" placeholder="admin@business.co.ke" required>
                    </div>
                    
                    <div class="form-group">
                        <label>M-PESA Phone Number</label>
                        <input type="tel" id="regPhone" placeholder="254712345678" required>
                        <div class="phone-hint">Enter in format: 254XXXXXXXXX</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Create Password</label>
                        <input type="password" id="regPassword" placeholder="Minimum 6 characters" required>
                    </div>
                    
                    <div class="bank-details-section">
                        <h4>🏦 Settlement Destination</h4>
                        <div class="form-group">
                            <label>Bank Name</label>
                            <select id="regBank" required>
                                <option value="">Select your bank...</option>
                                <option value="KCB">KCB Bank</option>
                                <option value="Equity">Equity Bank</option>
                                <option value="Cooperative">Cooperative Bank</option>
                                <option value="Absa">Absa Bank</option>
                                <option value="NCBA">NCBA Bank</option>
                                <option value="Other">Other Bank/Microfinance</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Account Number</label>
                            <input type="text" id="regAccountNumber" placeholder="Account for receiving payments" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="registerSubmitBtn">Get Started Now</button>
                </form>
                
                <div class="feature-list">
                    <ul>
                        <li>Automated M-PESA reconciliation</li>
                        <li>Direct bank settlements (24-48hrs)</li>
                        <li>Professional KRA-friendly PDF invoices</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPanel(panel) {
            // Tab visual update
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            
            // Content update
            document.getElementById('loginPanel').classList.remove('active');
            document.getElementById('registerPanel').classList.remove('active');
            
            if (panel === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
            
            // Reset Alert
            const alertDiv = document.getElementById('alert');
            alertDiv.style.display = 'none';
        }

        // Phone formatter
        const phoneInput = document.getElementById('regPhone');
        if (phoneInput) {
            phoneInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.startsWith('0')) value = '254' + value.substring(1);
                if (!value.startsWith('254') && value.length > 0) value = '254' + value;
                e.target.value = value.substring(0, 12);
            });
        }
    </script>
</body>
</html>
